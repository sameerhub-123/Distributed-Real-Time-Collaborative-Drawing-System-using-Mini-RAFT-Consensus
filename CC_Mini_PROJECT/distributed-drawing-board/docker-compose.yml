version: "3.9"

# ─── Shared logging config ────────────────────────────────────────────────────
# Keeps logs in one terminal, no log file rotation needed for dev.
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  raft-net:
    driver: bridge

services:

  # ─── Replica 1 (Cyan in logs) ─────────────────────────────────────────────
  replica1:
    build: ./replica
    container_name: replica1
    hostname: replica1
    environment:
      NODE_ID: replica1
      PORT: 4001
      PEERS: http://replica2:4002,http://replica3:4003
      # Force color output inside Docker (Node.js respects this)
      FORCE_COLOR: "1"
    ports:
      - "4001:4001"
    volumes:
      - ./replica/src:/app/src   # hot-reload via nodemon
    networks:
      - raft-net
    restart: unless-stopped
    logging: *default-logging

  # ─── Replica 2 (Yellow in logs) ───────────────────────────────────────────
  replica2:
    build: ./replica
    container_name: replica2
    hostname: replica2
    environment:
      NODE_ID: replica2
      PORT: 4002
      PEERS: http://replica1:4001,http://replica3:4003
      FORCE_COLOR: "1"
    ports:
      - "4002:4002"
    volumes:
      - ./replica/src:/app/src
    networks:
      - raft-net
    restart: unless-stopped
    logging: *default-logging

  # ─── Replica 3 (Magenta in logs) ──────────────────────────────────────────
  replica3:
    build: ./replica
    container_name: replica3
    hostname: replica3
    environment:
      NODE_ID: replica3
      PORT: 4003
      PEERS: http://replica1:4001,http://replica2:4002
      FORCE_COLOR: "1"
    ports:
      - "4003:4003"
    volumes:
      - ./replica/src:/app/src
    networks:
      - raft-net
    restart: unless-stopped
    logging: *default-logging

  # ─── Gateway (Blue in logs) ───────────────────────────────────────────────
  gateway:
    build: ./gateway
    container_name: gateway
    hostname: gateway
    environment:
      PORT: 3000
      REPLICAS: http://replica1:4001,http://replica2:4002,http://replica3:4003
      FORCE_COLOR: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./gateway/src:/app/src
    networks:
      - raft-net
    depends_on:
      - replica1
      - replica2
      - replica3
    restart: unless-stopped
    logging: *default-logging

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      VITE_GATEWAY_WS: ws://localhost:3000
      VITE_GATEWAY_HTTP: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - raft-net
    depends_on:
      - gateway
    restart: unless-stopped
    logging: *default-logging
